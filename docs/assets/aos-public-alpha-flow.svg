<svg width="1080" height="560" viewBox="0 0 1080 560" role="img" aria-labelledby="title desc">
  <title>Agentic OS public alpha flow</title>
  <desc>Private local categories and memory are compiled into provider instruction files for Codex, Claude Code, Gemini, and ChatGPT.</desc>
  <rect width="1080" height="560" rx="22" fill="#f6f8fb"/>
  <rect x="42" y="42" width="996" height="476" rx="18" fill="#ffffff" stroke="#d7dde8" stroke-width="2"/>

  <text x="84" y="100" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30" font-weight="700" fill="#111827">Agentic OS</text>
  <text x="84" y="132" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" fill="#4b5563">One local context layer. Multiple AI providers.</text>

  <rect x="82" y="174" width="270" height="214" rx="14" fill="#eef6ff" stroke="#8bb9f0" stroke-width="2"/>
  <text x="112" y="218" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="700" fill="#1d4ed8">Private local AOS home</text>
  <text x="112" y="253" font-family="SFMono-Regular, Consolas, monospace" font-size="15" fill="#1f2937">categories: book-draft</text>
  <text x="112" y="281" font-family="SFMono-Regular, Consolas, monospace" font-size="15" fill="#1f2937">memory: decisions</text>
  <text x="112" y="309" font-family="SFMono-Regular, Consolas, monospace" font-size="15" fill="#1f2937">workstyle: rules</text>
  <text x="112" y="337" font-family="SFMono-Regular, Consolas, monospace" font-size="15" fill="#1f2937">privacy: local files</text>

  <rect x="426" y="174" width="228" height="214" rx="14" fill="#f5f3ff" stroke="#a78bfa" stroke-width="2"/>
  <text x="454" y="218" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="700" fill="#6d28d9">Linked project</text>
  <text x="454" y="253" font-family="SFMono-Regular, Consolas, monospace" font-size="15" fill="#1f2937">aos init</text>
  <text x="454" y="281" font-family="SFMono-Regular, Consolas, monospace" font-size="15" fill="#1f2937">aos link-project</text>
  <text x="454" y="309" font-family="SFMono-Regular, Consolas, monospace" font-size="15" fill="#1f2937">aos memory add</text>
  <text x="454" y="337" font-family="SFMono-Regular, Consolas, monospace" font-size="15" fill="#1f2937">aos compile codex</text>

  <rect x="728" y="174" width="270" height="214" rx="14" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="2"/>
  <text x="758" y="218" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="700" fill="#047857">Provider instruction files</text>
  <text x="758" y="253" font-family="SFMono-Regular, Consolas, monospace" font-size="15" fill="#1f2937">AGENTS.md</text>
  <text x="758" y="281" font-family="SFMono-Regular, Consolas, monospace" font-size="15" fill="#1f2937">CLAUDE.md</text>
  <text x="758" y="309" font-family="SFMono-Regular, Consolas, monospace" font-size="15" fill="#1f2937">GEMINI.md</text>
  <text x="758" y="337" font-family="SFMono-Regular, Consolas, monospace" font-size="15" fill="#1f2937">ChatGPT instructions</text>

  <path d="M 362 281 L 414 281" stroke="#64748b" stroke-width="3" fill="none"/>
  <path d="M 414 281 L 402 273 L 402 289 Z" fill="#64748b"/>
  <path d="M 664 281 L 716 281" stroke="#64748b" stroke-width="3" fill="none"/>
  <path d="M 716 281 L 704 273 L 704 289 Z" fill="#64748b"/>

  <rect x="82" y="424" width="916" height="48" rx="12" fill="#111827"/>
  <text x="108" y="455" font-family="SFMono-Regular, Consolas, monospace" font-size="17" fill="#bfdbfe">$ aos compile codex --project-root ./first-project</text>
  <text x="702" y="455" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#d1fae5">fresh provider context, no vendor lock-in</text>
</svg>
