name: test

on:
  push:
  pull_request:

jobs:
  unittest:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]
    env:
      PYTHONPATH: src
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run unittest suite
        run: python3 -m unittest discover -s tests -v

      - name: Run distribution privacy gate
        run: python3 -m agentic_os distribution-check --repo-root . --json

      - name: Run public audit gate
        run: |
          if [ "${{ github.repository }}" = "Dai202703/agentic-os-public-alpha" ]; then
            python3 -m agentic_os public-audit --repo-root . --json
          else
            python3 -m agentic_os public-audit --repo-root . --tree-only --json
          fi

      - name: Run fresh user smoke
        run: python3 -m agentic_os fresh-user-smoke --repo-root . --json

      - name: Run release gate
        run: python3 -m agentic_os release-check --repo-root . --json
